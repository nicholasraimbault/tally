name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
      - name: cargo clippy (host, workspace excluding tally-worker)
        run: cargo clippy --workspace --exclude tally-worker --all-targets -- -D warnings
      - name: cargo clippy (wasm32, tally-worker)
        run: cargo clippy --package tally-worker --target wasm32-unknown-unknown --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
      - name: cargo test (host, workspace excluding tally-worker)
        run: cargo test --workspace --exclude tally-worker
      - name: cargo check --tests (wasm32, tally-worker)
        run: cargo check --package tally-worker --target wasm32-unknown-unknown --tests

  docs:
    name: Docs (strict)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
      - name: cargo doc --no-deps (host, workspace excluding tally-worker)
        run: cargo doc --workspace --exclude tally-worker --no-deps
      - name: cargo doc --no-deps (wasm32, tally-worker)
        run: cargo doc --package tally-worker --target wasm32-unknown-unknown --no-deps

  machete:
    name: Unused dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-machete
        run: cargo install cargo-machete
      - name: cargo machete
        run: cargo machete

  worker-build:
    name: Worker build verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
      - name: cargo build (tally-worker crate, wasm32)
        run: cargo build --package tally-worker --target wasm32-unknown-unknown

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    # Realistic budget per `docs/specs/integration-tests-sub-pr-test-plan.md`:
    # wrangler install ~10-15s; worker-build ~10-20s; wrangler dev startup
    # ~3-5s; 16 sequential HTTP tests at ~1-2s each ≈ 16-32s; alarm-fire
    # real-wait scenarios ~5-7s. Total ~1 minute cold-cache.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wrangler
        run: npm install -g wrangler
      - name: Install Rust (wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
      # Pre-build the worker so wrangler dev doesn't need to compile
      # on first request (which would push past the harness's 30s
      # readiness timeout). worker-build emits to
      # tally-worker/build/worker/shim.mjs — the wrangler.toml `main`
      # entry. worker-build must run from the tally-worker package
      # directory (the workspace root's Cargo.toml has no [package]
      # section).
      - name: Install worker-build
        run: cargo install -q worker-build --locked
      - name: Build worker (release)
        working-directory: tally-worker
        run: worker-build --release
      # Run the standalone test crate. The harness internally spawns
      # `wrangler dev --local` per test and tears it down on drop.
      # --test-threads=1 because tests share port 8787; parallel runs
      # would collide. cargo test's default is to run *test binaries*
      # in parallel; --jobs=1 keeps build sequential but doesn't affect
      # test-within-binary parallelism, which is what --test-threads
      # controls.
      - name: Run integration tests
        run: |
          cargo test --manifest-path integration-tests/Cargo.toml \
            -- --test-threads=1
