name = "tally"
main = "tally-worker/build/worker/shim.mjs"
compatibility_date = "2026-05-03"
# compatibility_flags removed: `http_request_timeout` isn't recognized by
# wrangler 4.92.0's workerd binary ("No such compatibility flag"). Per §9.2
# Q2 verification, Cloudflare's default HTTP request behavior is unlimited
# wall time while client is connected — no opt-in flag required for the
# 300s long-poll dispatch pattern.
compatibility_flags = []

[[durable_objects.bindings]]
name = "TALLY_TEAM_DO"
class_name = "TallyTeamDO"
# script_name omitted: that field references a DO defined in a different
# Worker; TallyTeamDO is defined in this Worker, so self-reference is
# redundant and confuses wrangler dev's binding resolution.

[[migrations]]
tag = "v1"
new_classes = ["TallyTeamDO"]

[build]
# worker-build must run from the tally-worker package directory; the
# workspace root's Cargo.toml has no [package] section, which
# worker-build rejects with "missing field `package`".
#
# worker-rs 0.7.0+ majorly-versions the `worker` crate and the
# `worker-build` binary together (per the v0.7.0 release notes); since
# we depend on `worker = "0.8.3"`, cargo picks the matching latest
# worker-build (currently 0.8.x). No explicit version pin needed in
# this build command — the worker-build resolver verifies the version
# match at install time and emits a clear error if there is a mismatch.
command = "cargo install -q worker-build && cd tally-worker && worker-build --release"
