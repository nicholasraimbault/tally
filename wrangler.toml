name = "tally"
main = "tally-worker/build/worker/shim.mjs"
compatibility_date = "2026-05-13"
compatibility_flags = ["http_request_timeout"]

[[durable_objects.bindings]]
name = "TALLY_TEAM_DO"
class_name = "TallyTeamDO"
# script_name omitted: that field references a DO defined in a different
# Worker; TallyTeamDO is defined in this Worker, so self-reference is
# redundant and confuses wrangler dev's binding resolution.

[[migrations]]
tag = "v1"
new_classes = ["TallyTeamDO"]

[build]
# worker-build must run from the tally-worker package directory; the
# workspace root's Cargo.toml has no [package] section, which
# worker-build rejects with "missing field `package`".
#
# Known toolchain compat issue: `worker = "0.5"` (the locked tally-worker
# dep version) doesn't compose cleanly with current worker-build /
# wasm-bindgen-cli releases. worker-build 0.8.3 requires worker >= 0.8.3;
# worker-build 0.1.14 bundles wasm-bindgen-cli 0.2.105 which mismatches
# tally's transitive wasm-bindgen 0.2.121. A future "upgrade worker-rs"
# sub-PR will upgrade `worker` to a current release and resolve this;
# in the meantime, `wrangler dev` invocations against this config are
# blocked. See docs/specs/integration-tests-sub-pr-test-plan.md
# § "CI execution status" for the full context.
command = "cargo install -q worker-build && cd tally-worker && worker-build --release"
