name = "tally"
main = "build/worker/shim.mjs"
compatibility_date = "2026-05-13"
compatibility_flags = ["http_request_timeout"]

[[durable_objects.bindings]]
name = "TALLY_TEAM_DO"
class_name = "TallyTeamDO"
# script_name omitted: that field references a DO defined in a different
# Worker; TallyTeamDO is defined in this Worker, so self-reference is
# redundant and confuses wrangler dev's binding resolution.

[[migrations]]
tag = "v1"
new_classes = ["TallyTeamDO"]

[build]
command = "cargo install -q worker-build && worker-build --release"
