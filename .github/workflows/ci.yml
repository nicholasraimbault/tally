name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
      - name: cargo clippy (host, workspace excluding tally-worker)
        run: cargo clippy --workspace --exclude tally-worker --all-targets -- -D warnings
      - name: cargo clippy (wasm32, tally-worker)
        run: cargo clippy --package tally-worker --target wasm32-unknown-unknown --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
      - name: cargo test (host, workspace excluding tally-worker)
        run: cargo test --workspace --exclude tally-worker
      - name: cargo check --tests (wasm32, tally-worker)
        run: cargo check --package tally-worker --target wasm32-unknown-unknown --tests

  docs:
    name: Docs (strict)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
      - name: cargo doc --no-deps (host, workspace excluding tally-worker)
        run: cargo doc --workspace --exclude tally-worker --no-deps
      - name: cargo doc --no-deps (wasm32, tally-worker)
        run: cargo doc --package tally-worker --target wasm32-unknown-unknown --no-deps

  machete:
    name: Unused dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-machete
        run: cargo install cargo-machete
      - name: cargo machete
        run: cargo machete

  worker-build:
    name: Worker build verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
      - name: cargo build (tally-worker crate, wasm32)
        run: cargo build --package tally-worker --target wasm32-unknown-unknown

  # Integration tests job removed pending worker-rs upgrade.
  # The test crate scaffolding (integration-tests/) is in this PR; its
  # compilation and lints are covered by the existing Tests / Clippy /
  # Format / Docs (strict) jobs above (which include the standalone
  # crate via cargo check --manifest-path). The CI runtime that actually
  # spawns `wrangler dev` against the tests is deferred until the worker
  # dep is upgraded from "0.5" to a current release. See
  # docs/specs/integration-tests-sub-pr-test-plan.md § "CI execution
  # status: blocked on worker-rs upgrade" for the concrete blocker.

  integration-tests-crate-checks:
    name: Integration tests crate (compile + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
      - name: cargo check (integration-tests crate)
        run: cargo check --manifest-path integration-tests/Cargo.toml --tests
      - name: cargo clippy (integration-tests crate)
        run: cargo clippy --manifest-path integration-tests/Cargo.toml --all-targets -- -D warnings
      - name: cargo fmt --check (integration-tests crate)
        working-directory: integration-tests
        run: cargo fmt --check
